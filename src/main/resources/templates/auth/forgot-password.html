<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Forgot Password — User Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #C0392B 0%, #96281B 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }
        .auth-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,.25);
            width: 100%;
            max-width: 400px;
            padding: 40px 36px;
        }
        .brand-icon {
            width: 52px; height: 52px;
            background: #C0392B;
            border-radius: 13px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; color: white;
            margin: 0 auto 14px;
        }
        .auth-title {
            font-size: 22px; font-weight: 700;
            color: #212121; text-align: center; margin-bottom: 4px;
        }
        .auth-sub {
            font-size: 13px; color: #9E9E9E;
            text-align: center; margin-bottom: 28px;
        }
        .form-label {
            font-size: 13px; font-weight: 600;
            color: #616161; margin-bottom: 6px; display: block;
        }
        .input-wrap {
            display: flex; align-items: stretch;
            border: 1.5px solid #E0E0E0; border-radius: 8px;
            overflow: hidden; transition: border-color .18s;
        }
        .input-wrap:focus-within {
            border-color: #C0392B;
            box-shadow: 0 0 0 3px rgba(192,57,43,.12);
        }
        .input-icon {
            display: flex; align-items: center;
            padding: 0 12px; background: #FAFAFA;
            color: #9E9E9E; font-size: 15px;
            border-right: 1px solid #E0E0E0;
        }
        .input-wrap input {
            flex: 1; border: none; outline: none;
            padding: 10px 12px; font-size: 13.5px;
            color: #212121; background: #fff;
        }
        .form-error {
            font-size: 12px; color: #C0392B;
            margin-top: 4px; display: block;
        }
        .btn-submit {
            width: 100%; padding: 11px;
            background: #C0392B; color: white;
            border: none; border-radius: 8px;
            font-size: 14px; font-weight: 600;
            cursor: pointer; transition: background .18s;
            display: flex; align-items: center;
            justify-content: center; gap: 8px;
            margin-top: 4px;
        }
        .btn-submit:hover { background: #96281B; }
        .flash-error {
            background: #FDEDEC; border: 1px solid #F1948A;
            border-radius: 8px; padding: 10px 14px;
            color: #C0392B; font-size: 13px;
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 18px;
        }
        .flash-success {
            background: #E8F5E9; border: 1px solid #A5D6A7;
            border-radius: 8px; padding: 12px 14px;
            color: #2E7D32; font-size: 13px;
            display: flex; align-items: flex-start; gap: 8px;
            margin-bottom: 18px;
        }
        .divider { border-color: #F0F0F0; margin: 20px 0 16px; }
        .back-text { text-align: center; font-size: 13px; color: #9E9E9E; }
        .back-link { color: #C0392B; font-weight: 600; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        .mb-4 { margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="auth-card">

    <div class="brand-icon">
        <i class="bi bi-key-fill"></i>
    </div>
    <div class="auth-title">Forgot password?</div>
    <div class="auth-sub">Enter your email and we'll send you a reset link</div>

    <div th:if="${error}" class="flash-error">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span th:text="${error}"></span>
    </div>

    <div th:if="${message}" class="flash-success">
        <i class="bi bi-check-circle-fill" style="margin-top:1px;flex-shrink:0;"></i>
        <span th:text="${message}"></span>
    </div>

    <form th:action="@{/forgot-password}" method="post" th:object="${forgotRequest}">

        <div class="mb-4">
            <label class="form-label">Email Address</label>
            <div class="input-wrap" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                <div class="input-icon"><i class="bi bi-envelope"></i></div>
                <input type="email" th:field="*{email}"
                       placeholder="you@example.com"
                       autocomplete="email" required/>
            </div>
            <span class="form-error" th:if="${#fields.hasErrors('email')}"
                  th:errors="*{email}"></span>
        </div>

        <button type="submit" class="btn-submit">
            <i class="bi bi-send"></i>Send Reset Link
        </button>

    </form>

    <hr class="divider"/>
    <p class="back-text">
        Remember your password?
        <a th:href="@{/login}" class="back-link">Sign in</a>
    </p>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
