<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Forgot Password — Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>body{background:linear-gradient(135deg,#0d1117,#161b22);min-height:100vh;}.auth-card{border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);}</style>
</head>
<body class="d-flex align-items-center justify-content-center">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card auth-card border-0 p-4">
                <div class="text-center mb-4">
                    <div class="mx-auto mb-3" style="width:56px;height:56px;background:#EF9F27;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;color:white;">
                        <i class="bi bi-key-fill"></i>
                    </div>
                    <h4 class="fw-bold mb-1">Forgot password?</h4>
                    <p class="text-muted small">Enter your email to receive a reset link</p>
                </div>

                <div th:if="${error}" class="alert alert-danger py-2 small">
                    <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${error}"></span>
                </div>
                <div th:if="${message}" class="alert alert-success py-2 small">
                    <i class="bi bi-check-circle me-1"></i><span th:text="${message}"></span>
                </div>

                <form th:action="@{/forgot-password}" method="post"
                      th:object="${forgotRequest}">
                    <div class="mb-3">
                        <label class="form-label fw-medium small">Email address</label>
                        <input type="email" th:field="*{email}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                               placeholder="you@example.com" required/>
                        <div class="invalid-feedback small" th:errors="*{email}"></div>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 py-2 fw-medium">
                        <i class="bi bi-send me-2"></i>Send Reset Link
                    </button>
                </form>

                <p class="text-center text-muted small mt-3 mb-0">
                    Remember your password?
                    <a th:href="@{/login}" class="text-primary text-decoration-none fw-medium">Sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
