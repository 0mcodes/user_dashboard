<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Reset Password — Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>body{background:linear-gradient(135deg,#0d1117,#161b22);min-height:100vh;}.auth-card{border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);}</style>
</head>
<body class="d-flex align-items-center justify-content-center">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card auth-card border-0 p-4">
                <div class="text-center mb-4">
                    <div class="mx-auto mb-3" style="width:56px;height:56px;background:#9C5FD7;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;color:white;">
                        <i class="bi bi-shield-lock-fill"></i>
                    </div>
                    <h4 class="fw-bold mb-1">Reset password</h4>
                    <p class="text-muted small">Enter your new password below</p>
                </div>

                <div th:if="${error}" class="alert alert-danger py-2 small">
                    <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${error}"></span>
                </div>

                <form th:action="@{/reset-password}" method="post"
                      th:object="${resetRequest}">
                    <!-- Hidden token field -->
                    <input type="hidden" th:field="*{token}" th:value="${token}"/>

                    <div class="mb-3">
                        <label class="form-label fw-medium small">New Password</label>
                        <input type="password" th:field="*{newPassword}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid'"
                               placeholder="Min 8 chars, upper, lower, digit, special"/>
                        <div class="invalid-feedback small" th:errors="*{newPassword}"></div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-medium small">Confirm Password</label>
                        <input type="password" th:field="*{confirmPassword}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                               placeholder="Repeat new password"/>
                        <div class="invalid-feedback small" th:errors="*{confirmPassword}"></div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-medium">
                        <i class="bi bi-check-lg me-2"></i>Reset Password
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
