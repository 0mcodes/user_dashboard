<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — User Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
        body { background: linear-gradient(135deg, #0d1117 0%, #161b22 100%); min-height: 100vh; }
        .auth-card { border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
        .brand-icon { width: 56px; height: 56px; background: #3B8BD4; border-radius: 14px; display:flex; align-items:center; justify-content:center; font-size:24px; color:white; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card auth-card border-0 p-4">

                <!-- Brand -->
                <div class="text-center mb-4">
                    <div class="brand-icon mx-auto mb-3">
                        <i class="bi bi-grid-3x3-gap-fill"></i>
                    </div>
                    <h4 class="fw-bold mb-1">Welcome back</h4>
                    <p class="text-muted small">Sign in to your dashboard</p>
                </div>

                <!-- Alerts -->
                <div th:if="${error}"
                     class="alert alert-danger py-2 small">
                    <i class="bi bi-exclamation-triangle me-1"></i>
                    <span th:text="${error}"></span>
                </div>
                <div th:if="${message}"
                     class="alert alert-success py-2 small">
                    <i class="bi bi-check-circle me-1"></i>
                    <span th:text="${message}"></span>
                </div>

                <!-- Login Form -->
                <!-- Spring Security processes POST /login automatically -->
                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-medium small">Email address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light">
                                <i class="bi bi-envelope text-muted"></i>
                            </span>
                            <input type="email" name="username"
                                   class="form-control"
                                   placeholder="you@example.com"
                                   required autofocus/>
                        </div>
                    </div>
                    <div class="mb-4">
                        <div class="d-flex justify-content-between">
                            <label class="form-label fw-medium small">Password</label>
                            <a th:href="@{/forgot-password}"
                               class="small text-primary text-decoration-none">
                                Forgot password?
                            </a>
                        </div>
                        <div class="input-group">
                            <span class="input-group-text bg-light">
                                <i class="bi bi-lock text-muted"></i>
                            </span>
                            <input type="password" name="password"
                                   class="form-control"
                                   placeholder="Enter password"
                                   required/>
                        </div>
                    </div>
                    <button type="submit"
                            class="btn btn-primary w-100 py-2 fw-medium">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>
                </form>

                <hr class="my-3"/>

                <p class="text-center text-muted small mb-0">
                    Don't have an account?
                    <a th:href="@{/register}"
                       class="text-primary text-decoration-none fw-medium">
                        Register here
                    </a>
                </p>

                <!-- Demo credentials -->
                <div class="mt-3 p-3 bg-light rounded-3">
                    <p class="text-muted small fw-medium mb-2">
                        <i class="bi bi-info-circle me-1"></i>Demo accounts
                    </p>
                    <div class="small text-muted">
                        <div><span class="badge bg-danger me-1">Admin</span>admin@dashboard.com / Admin@123</div>
                        <div class="mt-1"><span class="badge bg-warning text-dark me-1">Mgr</span>manager@dashboard.com / Manager@123</div>
                        <div class="mt-1"><span class="badge bg-info text-dark me-1">User</span>rahul@dashboard.com / User@1234</div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
</body>
</html>
