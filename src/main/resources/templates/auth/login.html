<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — User Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #C0392B 0%, #96281B 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }
        .auth-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,.25);
            width: 100%;
            max-width: 420px;
            padding: 40px 36px;
        }
        .brand-icon {
            width: 52px; height: 52px;
            background: #C0392B;
            border-radius: 13px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; color: white;
            margin: 0 auto 16px;
        }
        .auth-title {
            font-size: 22px; font-weight: 700;
            color: #212121; text-align: center; margin-bottom: 4px;
        }
        .auth-sub {
            font-size: 13px; color: #9E9E9E;
            text-align: center; margin-bottom: 28px;
        }
        .form-label {
            font-size: 13px; font-weight: 600;
            color: #616161; margin-bottom: 6px;
        }
        .input-wrap {
            display: flex; align-items: stretch;
            border: 1.5px solid #E0E0E0; border-radius: 8px;
            overflow: hidden; transition: border-color .18s;
        }
        .input-wrap:focus-within {
            border-color: #C0392B;
            box-shadow: 0 0 0 3px rgba(192,57,43,.12);
        }
        .input-icon {
            display: flex; align-items: center;
            padding: 0 12px;
            background: #FAFAFA;
            color: #9E9E9E; font-size: 15px;
            border-right: 1px solid #E0E0E0;
        }
        .input-wrap input {
            flex: 1; border: none; outline: none;
            padding: 10px 12px; font-size: 13.5px;
            color: #212121; background: #fff;
        }
        .eye-btn {
            display: flex; align-items: center;
            padding: 0 12px; border: none;
            background: #fff; color: #9E9E9E;
            cursor: pointer; font-size: 15px;
            border-left: 1px solid #E0E0E0;
            transition: color .15s;
        }
        .eye-btn:hover { color: #C0392B; }
        .btn-submit {
            width: 100%; padding: 11px;
            background: #C0392B; color: white;
            border: none; border-radius: 8px;
            font-size: 14px; font-weight: 600;
            cursor: pointer; transition: background .18s;
            display: flex; align-items: center;
            justify-content: center; gap: 8px;
        }
        .btn-submit:hover { background: #96281B; }
        .forgot-link {
            font-size: 12px; color: #C0392B;
            text-decoration: none; font-weight: 600;
        }
        .forgot-link:hover { text-decoration: underline; }
        .divider { border-color: #F0F0F0; margin: 20px 0; }
        .register-text {
            text-align: center; font-size: 13px; color: #9E9E9E;
        }
        .register-link {
            color: #C0392B; font-weight: 600; text-decoration: none;
        }
        .register-link:hover { text-decoration: underline; }
        .flash-error {
            background: #FDEDEC; border: 1px solid #F1948A;
            border-radius: 8px; padding: 10px 14px;
            color: #C0392B; font-size: 13px;
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 18px;
        }
        .flash-success {
            background: #E8F5E9; border: 1px solid #A5D6A7;
            border-radius: 8px; padding: 10px 14px;
            color: #2E7D32; font-size: 13px;
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 18px;
        }
        .demo-box {
            background: #FAFAFA; border: 1px solid #F0F0F0;
            border-radius: 10px; padding: 14px 16px;
            margin-top: 20px;
        }
        .demo-title {
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: .06em;
            color: #9E9E9E; margin-bottom: 8px;
        }
        .demo-row {
            display: flex; align-items: center;
            gap: 8px; margin-bottom: 5px; font-size: 12px;
        }
        .demo-row:last-child { margin-bottom: 0; }
        .demo-badge {
            font-size: 10px; font-weight: 700;
            padding: 2px 7px; border-radius: 10px;
        }
        .badge-admin { background: #FDEDEC; color: #C0392B; }
        .badge-mgr   { background: #FFF8E1; color: #F57F17; }
        .badge-user  { background: #F5F5F5; color: #616161; }
        .demo-cred   { color: #616161; }
        .demo-pw     { color: #9E9E9E; }
        .mb-3 { margin-bottom: 16px; }
        .mb-4 { margin-bottom: 22px; }
    </style>
</head>
<body>
<div class="auth-card">

    <div class="brand-icon">
        <i class="bi bi-grid-3x3-gap-fill"></i>
    </div>
    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Sign in to your dashboard</div>

    <div th:if="${error}" class="flash-error">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span th:text="${error}"></span>
    </div>
    <div th:if="${message}" class="flash-success">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${message}"></span>
    </div>

    <form th:action="@{/login}" method="post">

        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <div class="input-wrap">
                <div class="input-icon"><i class="bi bi-envelope"></i></div>
                <input type="email" name="username"
                       placeholder="you@example.com"
                       autocomplete="email" required autofocus/>
            </div>
        </div>

        <div class="mb-4">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
                <label class="form-label" style="margin:0;">Password</label>
                <a th:href="@{/forgot-password}" class="forgot-link">Forgot password?</a>
            </div>
            <div class="input-wrap">
                <div class="input-icon"><i class="bi bi-lock"></i></div>
                <input type="password" name="password" id="loginPwd"
                       placeholder="Enter your password"
                       autocomplete="current-password" required/>
                <button type="button" class="eye-btn"
                        onclick="togglePassword('loginPwd',this)" tabindex="-1">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
        </div>

        <button type="submit" class="btn-submit">
            <i class="bi bi-box-arrow-in-right"></i>Sign In
        </button>
    </form>

    <hr class="divider"/>
    <p class="register-text">
        Don't have an account?
        <a th:href="@{/register}" class="register-link">Register here</a>
    </p>

    <div class="demo-box">
        <div class="demo-title"><i class="bi bi-info-circle me-1"></i>Demo Accounts</div>
        <div class="demo-row">
            <span class="demo-badge badge-admin">Admin</span>
            <span class="demo-cred">admin@dashboard.com</span>
            <span class="demo-pw">/ Admin@123</span>
        </div>
        <div class="demo-row">
            <span class="demo-badge badge-mgr">Manager</span>
            <span class="demo-cred">manager@dashboard.com</span>
            <span class="demo-pw">/ Manager@123</span>
        </div>
        <div class="demo-row">
            <span class="demo-badge badge-user">User</span>
            <span class="demo-cred">rahul@dashboard.com</span>
            <span class="demo-pw">/ User@1234</span>
        </div>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/auth.js}"></script>
</body>
</html>
