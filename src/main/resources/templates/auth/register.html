<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register — User Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
        body { background: linear-gradient(135deg,#0d1117 0%,#161b22 100%); min-height:100vh; }
        .auth-card { border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,.3); }
        .brand-icon { width:56px; height:56px; background:#1D9E75; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:24px; color:white; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card auth-card border-0 p-4">

                <div class="text-center mb-4">
                    <div class="brand-icon mx-auto mb-3">
                        <i class="bi bi-person-plus-fill"></i>
                    </div>
                    <h4 class="fw-bold mb-1">Create account</h4>
                    <p class="text-muted small">Join the dashboard today</p>
                </div>

                <div th:if="${error}"
                     class="alert alert-danger py-2 small">
                    <i class="bi bi-exclamation-triangle me-1"></i>
                    <span th:text="${error}"></span>
                </div>

                <form th:action="@{/register}" method="post"
                      th:object="${registerRequest}">

                    <div class="row g-3">
                        <div class="col-6">
                            <label class="form-label fw-medium small">First Name</label>
                            <input type="text" th:field="*{firstName}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"
                                   placeholder="First name"/>
                            <div class="invalid-feedback small"
                                 th:errors="*{firstName}"></div>
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-medium small">Last Name</label>
                            <input type="text" th:field="*{lastName}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"
                                   placeholder="Last name"/>
                            <div class="invalid-feedback small"
                                 th:errors="*{lastName}"></div>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-medium small">Email</label>
                            <input type="email" th:field="*{email}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                   placeholder="you@example.com"/>
                            <div class="invalid-feedback small"
                                 th:errors="*{email}"></div>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-medium small">Phone Number</label>
                            <input type="tel" th:field="*{phoneNumber}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('phoneNumber')} ? 'is-invalid'"
                                   placeholder="+91XXXXXXXXXX"/>
                            <div class="invalid-feedback small"
                                 th:errors="*{phoneNumber}"></div>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-medium small">Password</label>
                            <input type="password" th:field="*{password}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                   placeholder="Min 8 chars, upper, lower, digit, special"/>
                            <div class="invalid-feedback small"
                                 th:errors="*{password}"></div>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-medium small">Confirm Password</label>
                            <input type="password" th:field="*{confirmPassword}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                                   placeholder="Repeat password"/>
                            <div class="invalid-feedback small"
                                 th:errors="*{confirmPassword}"></div>
                        </div>
                    </div>

                    <button type="submit"
                            class="btn btn-success w-100 py-2 fw-medium mt-4">
                        <i class="bi bi-person-check me-2"></i>Create Account
                    </button>
                </form>

                <p class="text-center text-muted small mt-3 mb-0">
                    Already have an account?
                    <a th:href="@{/login}"
                       class="text-primary text-decoration-none fw-medium">
                        Sign in
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
