<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{dashboard/fragments/layout :: layout(~{::content}, 'Access Denied')}">
<body>
<div th:fragment="content">
    <div class="text-center py-5">
        <div class="mb-4" style="font-size:80px;">🚫</div>
        <h2 class="fw-bold text-danger mb-2">Access Denied</h2>
        <p class="text-muted mb-4">
            You don't have permission to view this page.<br/>
            Contact your administrator if you think this is wrong.
        </p>
        <a th:href="@{/dashboard/redirect}"
           class="btn btn-primary">
            <i class="bi bi-house me-2"></i>Go to My Dashboard
        </a>
    </div>
</div>
</body>
</html>
