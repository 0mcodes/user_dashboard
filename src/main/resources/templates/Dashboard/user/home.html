<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{dashboard/fragments/layout :: layout(~{::content}, 'My Dashboard')}">
<body>
<div th:fragment="content">

    <div class="mb-4">
        <h4 class="fw-bold mb-1">Welcome, <span th:text="${profile.firstName}">User</span>!</h4>
        <p class="text-muted small mb-0">Here's a summary of your account</p>
    </div>

    <!-- Profile card -->
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body text-center py-4">
                    <div class="avatar-circle-lg mx-auto mb-3"
                         th:text="${#strings.substring(profile.firstName,0,1) + #strings.substring(profile.lastName,0,1)}">??</div>
                    <h5 class="fw-bold mb-1" th:text="${profile.fullName}">Name</h5>
                    <p class="text-muted small mb-2" th:text="${profile.email}">email</p>
                    <span class="badge bg-primary mb-3"
                          th:text="${profile.role.name().replace('ROLE_','')}">USER</span>
                    <p th:if="${profile.bio}" class="text-muted small"
                       th:text="${profile.bio}"></p>
                    <a th:href="@{/dashboard/user/profile}"
                       class="btn btn-outline-primary btn-sm mt-2">
                        <i class="bi bi-pencil me-1"></i>Edit Profile
                    </a>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="row g-3">
                <div class="col-12">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white fw-medium small">Account Information</div>
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-sm-6">
                                    <div class="text-muted small">First Name</div>
                                    <div class="fw-medium" th:text="${profile.firstName}">-</div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="text-muted small">Last Name</div>
                                    <div class="fw-medium" th:text="${profile.lastName}">-</div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="text-muted small">Email</div>
                                    <div class="fw-medium" th:text="${profile.email}">-</div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="text-muted small">Phone</div>
                                    <div class="fw-medium"
                                         th:text="${profile.phoneNumber != null ? profile.phoneNumber : 'Not set'}">-</div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="text-muted small">Account Status</div>
                                    <span class="badge bg-success">Active</span>
                                </div>
                                <div class="col-sm-6">
                                    <div class="text-muted small">Member Since</div>
                                    <div class="fw-medium"
                                         th:text="${#temporals.format(profile.createdAt,'dd MMM yyyy')}">-</div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="text-muted small">Last Login</div>
                                    <div class="fw-medium"
                                         th:text="${profile.lastLoginAt != null ? #temporals.format(profile.lastLoginAt,'dd MMM yyyy HH:mm') : 'First login'}">-</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white fw-medium small">Quick Actions</div>
                        <div class="card-body d-flex flex-wrap gap-2">
                            <a th:href="@{/dashboard/user/profile}"
                               class="btn btn-outline-primary btn-sm">
                                <i class="bi bi-person me-1"></i>Edit Profile
                            </a>
                            <a th:href="@{/dashboard/user/profile}"
                               class="btn btn-outline-warning btn-sm">
                                <i class="bi bi-lock me-1"></i>Change Password
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
