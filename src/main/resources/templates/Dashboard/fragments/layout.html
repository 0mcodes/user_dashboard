<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(content, pageTitle)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' — Dashboard'">Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"
          rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet"/>
    <link th:href="@{/css/dashboard.css}" rel="stylesheet"/>
</head>
<body class="bg-light">

<!-- Navbar -->
<div th:replace="~{dashboard/fragments/navbar :: navbar}"></div>

<div class="d-flex" style="padding-top:56px;">

    <!-- Sidebar -->
    <div th:replace="~{dashboard/fragments/sidebar :: sidebar}"></div>

    <!-- Main content -->
    <main class="main-content flex-grow-1 p-4">

        <!-- Success flash -->
        <div th:if="${message}"
             class="alert alert-success alert-dismissible fade show"
             role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${message}"></span>
            <button type="button" class="btn-close"
                    data-bs-dismiss="alert"></button>
        </div>

        <!-- Error flash -->
        <div th:if="${error}"
             class="alert alert-danger alert-dismissible fade show"
             role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${error}"></span>
            <button type="button" class="btn-close"
                    data-bs-dismiss="alert"></button>
        </div>

        <!-- Password error flash -->
        <div th:if="${passwordError}"
             class="alert alert-danger alert-dismissible fade show"
             role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${passwordError}"></span>
            <button type="button" class="btn-close"
                    data-bs-dismiss="alert"></button>
        </div>

        <!-- Page content injected here -->
        <th:block th:replace="${content}"/>

    </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/dashboard.js}"></script>

</body>
</html>
