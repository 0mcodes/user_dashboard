<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="sidebar" class="sidebar bg-white" id="sidebar">
    <div class="p-3">

        <!-- ── ADMIN SECTION ─────────────────────────────────── -->
        <div sec:authorize="hasAuthority('ROLE_ADMIN')">

            <div class="sidebar-label">Admin Controls</div>

            <a th:href="@{/dashboard/admin/home}"
               class="sidebar-link"
               th:classappend="${activePage == 'admin-home'} ? 'active'">
                <i class="bi bi-speedometer2 me-2"></i>Overview
            </a>

            <a th:href="@{/dashboard/admin/users}"
               class="sidebar-link"
               th:classappend="${activePage == 'admin-users'} ? 'active'">
                <i class="bi bi-people me-2"></i>Manage Users
            </a>

            <a th:href="@{/dashboard/admin/audit-logs}"
               class="sidebar-link"
               th:classappend="${activePage == 'admin-audit'} ? 'active'">
                <i class="bi bi-journal-text me-2"></i>Audit Logs
            </a>

            <a href="/h2-console" target="_blank"
               class="sidebar-link">
                <i class="bi bi-database me-2"></i>H2 Database
                <i class="bi bi-box-arrow-up-right ms-auto small text-muted"></i>
            </a>

            <a href="/swagger-ui.html" target="_blank"
               class="sidebar-link">
                <i class="bi bi-code-slash me-2"></i>API Docs
                <i class="bi bi-box-arrow-up-right ms-auto small text-muted"></i>
            </a>

        </div>

        <!-- ── MANAGER SECTION ───────────────────────────────── -->
        <div sec:authorize="hasAuthority('ROLE_MANAGER')">

            <div class="sidebar-label">Manager</div>

            <a th:href="@{/dashboard/manager/home}"
               class="sidebar-link"
               th:classappend="${activePage == 'manager-home'} ? 'active'">
                <i class="bi bi-bar-chart me-2"></i>Overview
            </a>

            <a th:href="@{/dashboard/manager/users}"
               class="sidebar-link"
               th:classappend="${activePage == 'manager-users'} ? 'active'">
                <i class="bi bi-person-check me-2"></i>Team Users
            </a>

        </div>

        <!-- ── MY ACCOUNT ────────────────────────────────────── -->
        <div class="sidebar-label mt-3">My Account</div>

        <a th:href="@{/dashboard/user/home}"
           class="sidebar-link"
           th:classappend="${activePage == 'user-home'} ? 'active'">
            <i class="bi bi-house me-2"></i>Home
        </a>

        <a th:href="@{/dashboard/user/profile}"
           class="sidebar-link"
           th:classappend="${activePage == 'user-profile'} ? 'active'">
            <i class="bi bi-person me-2"></i>Profile &amp; Password
        </a>

    </div>
</nav>
</body>
</html>
