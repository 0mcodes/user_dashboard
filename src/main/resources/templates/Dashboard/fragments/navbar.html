<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar"
     class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow-sm">
    <div class="container-fluid px-4">

        <!-- Brand -->
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2"
           th:href="@{/dashboard/redirect}">
            <div style="width:32px;height:32px;background:#3B8BD4;
                        border-radius:8px;display:flex;align-items:center;
                        justify-content:center;font-size:15px;">
                <i class="bi bi-grid-3x3-gap-fill text-white"></i>
            </div>
            UserDashboard
        </a>

        <!-- Right side -->
        <div class="d-flex align-items-center gap-3 ms-auto">

            <!-- Role badge -->
            <span sec:authorize="hasAuthority('ROLE_ADMIN')"
                  class="badge bg-danger px-2 py-1">
                <i class="bi bi-shield-fill me-1"></i>ADMIN
            </span>
            <span sec:authorize="hasAuthority('ROLE_MANAGER')"
                  class="badge bg-warning text-dark px-2 py-1">
                <i class="bi bi-person-badge-fill me-1"></i>MANAGER
            </span>
            <span sec:authorize="hasAuthority('ROLE_USER')"
                  class="badge bg-info text-dark px-2 py-1">
                <i class="bi bi-person-fill me-1"></i>USER
            </span>

            <!-- Logged in user email -->
            <span class="text-light small d-none d-md-inline">
                <i class="bi bi-person-circle me-1"></i>
                <sec:authentication property="name"/>
            </span>

            <!-- Logout button -->
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit"
                        class="btn btn-outline-light btn-sm px-3">
                    <i class="bi bi-box-arrow-right me-1"></i>
                    <span class="d-none d-md-inline">Logout</span>
                </button>
            </form>
        </div>
    </div>
</nav>
</body>
</html>
