<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{dashboard/fragments/layout :: layout(~{::content}, 'Manage Users')}">
<body>
<div th:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-1">Manage Users</h4>
            <p class="text-muted small mb-0"
               th:text="${users.totalElements} + ' total users'">0 total users</p>
        </div>
    </div>

    <!-- Search -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body py-3">
            <form th:action="@{/dashboard/admin/users}" method="get"
                  class="d-flex gap-2">
                <input type="text" name="search"
                       th:value="${search}"
                       class="form-control form-control-sm"
                       placeholder="Search by name or email..."
                       style="max-width:320px;"/>
                <button type="submit" class="btn btn-primary btn-sm">
                    <i class="bi bi-search me-1"></i>Search
                </button>
                <a th:href="@{/dashboard/admin/users}"
                   class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-x-lg me-1"></i>Clear
                </a>
            </form>
        </div>
    </div>

    <!-- Users Table -->
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th class="ps-4">User</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Joined</th>
                        <th>Last Login</th>
                        <th class="text-end pe-4">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users.content}">
                        <td class="ps-4">
                            <div class="d-flex align-items-center gap-3">
                                <div class="avatar-circle"
                                     th:text="${#strings.substring(user.firstName,0,1) + #strings.substring(user.lastName,0,1)}">??</div>
                                <div>
                                    <div class="fw-medium small"
                                         th:text="${user.fullName}">Name</div>
                                    <div class="text-muted"
                                         style="font-size:11px;"
                                         th:text="${user.email}">email</div>
                                </div>
                            </div>
                        </td>
                        <td>
                                <span th:switch="${user.role.name()}">
                                    <span th:case="'ROLE_ADMIN'"
                                          class="badge bg-danger">ADMIN</span>
                                    <span th:case="'ROLE_MANAGER'"
                                          class="badge bg-warning text-dark">MANAGER</span>
                                    <span th:case="*"
                                          class="badge bg-secondary">USER</span>
                                </span>
                        </td>
                        <td>
                                <span th:if="${user.enabled}"
                                      class="badge bg-success-subtle text-success border border-success-subtle">
                                    <i class="bi bi-circle-fill me-1" style="font-size:7px;"></i>Active
                                </span>
                            <span th:unless="${user.enabled}"
                                  class="badge bg-danger-subtle text-danger border border-danger-subtle">
                                    <i class="bi bi-circle-fill me-1" style="font-size:7px;"></i>Disabled
                                </span>
                        </td>
                        <td class="small text-muted"
                            th:text="${#temporals.format(user.createdAt,'dd MMM yyyy')}">-</td>
                        <td class="small text-muted"
                            th:text="${user.lastLoginAt != null ? #temporals.format(user.lastLoginAt,'dd MMM yyyy') : 'Never'}">-</td>
                        <td class="text-end pe-4">
                            <div class="d-flex gap-1 justify-content-end">

                                <!-- Change Role -->
                                <form th:action="@{/dashboard/admin/users/{id}/role(id=${user.id})}"
                                      method="post" class="d-flex gap-1">
                                    <select name="role" class="form-select form-select-sm"
                                            style="width:110px;font-size:12px;">
                                        <option value="ROLE_USER"
                                                th:selected="${user.role.name() == 'ROLE_USER'}">User</option>
                                        <option value="ROLE_MANAGER"
                                                th:selected="${user.role.name() == 'ROLE_MANAGER'}">Manager</option>
                                        <option value="ROLE_ADMIN"
                                                th:selected="${user.role.name() == 'ROLE_ADMIN'}">Admin</option>
                                    </select>
                                    <button type="submit"
                                            class="btn btn-outline-primary btn-sm"
                                            title="Update role">
                                        <i class="bi bi-check-lg"></i>
                                    </button>
                                </form>

                                <!-- Toggle Enable -->
                                <form th:action="@{/dashboard/admin/users/{id}/toggle(id=${user.id})}"
                                      method="post">
                                    <input type="hidden" name="enabled"
                                           th:value="${!user.enabled}"/>
                                    <button type="submit"
                                            th:class="${user.enabled} ? 'btn btn-outline-warning btn-sm' : 'btn btn-outline-success btn-sm'"
                                            th:title="${user.enabled} ? 'Disable user' : 'Enable user'">
                                        <i th:class="${user.enabled} ? 'bi bi-pause-fill' : 'bi bi-play-fill'"></i>
                                    </button>
                                </form>

                                <!-- Delete -->
                                <form th:action="@{/dashboard/admin/users/{id}/delete(id=${user.id})}"
                                      method="post"
                                      onsubmit="return confirm('Permanently delete this user? This cannot be undone.')">
                                    <button type="submit"
                                            class="btn btn-outline-danger btn-sm"
                                            title="Delete user">
                                        <i class="bi bi-trash3"></i>
                                    </button>
                                </form>

                                <!-- Audit logs -->
                                <a th:href="@{/dashboard/admin/audit-logs}"
                                   class="btn btn-outline-secondary btn-sm"
                                   title="View audit logs">
                                    <i class="bi bi-journal-text"></i>
                                </a>
                            </div>
                        </td>
                    </tr>

                    <!-- Empty state -->
                    <tr th:if="${users.content.empty}">
                        <td colspan="6" class="text-center py-5 text-muted">
                            <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                            No users found
                            <span th:if="${search != null}">
                                    for "<span th:text="${search}"></span>"
                                </span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <div class="card-footer bg-white d-flex justify-content-between
            align-items-center flex-wrap gap-2">

            <!-- Showing X to Y of Z -->
            <small class="text-muted">
                Showing
                <span class="fw-medium"
                      th:text="${users.currentPage * users.pageSize + 1}">1</span>
                to
                <span class="fw-medium"
                      th:text="${users.currentPage * users.pageSize + users.content.size()}">10</span>
                of
                <span class="fw-medium"
                      th:text="${users.totalElements}">0</span>
                users
            </small>

            <!-- Page size selector -->
            <form th:action="@{/dashboard/admin/users}"
                  method="get"
                  class="d-flex align-items-center gap-2">
                <input type="hidden" name="page" value="0"/>
                <input type="hidden" name="search"
                       th:value="${search}"/>
                <label class="text-muted small mb-0">Rows per page:</label>
                <select name="size"
                        class="form-select form-select-sm"
                        style="width:75px;"
                        onchange="this.form.submit()">
                    <option value="3"
                            th:selected="${users.pageSize == 3}">3</option>
                    <option value="5"
                            th:selected="${users.pageSize == 5}">5</option>
                    <option value="10"
                            th:selected="${users.pageSize == 10}">10</option>
                    <option value="25"
                            th:selected="${users.pageSize == 25}">25</option>
                    <option value="50"
                            th:selected="${users.pageSize == 50}">50</option>
                </select>
            </form>

            <!-- Page number buttons -->
            <nav aria-label="User table pagination">
                <ul class="pagination pagination-sm mb-0">

                    <!-- Previous button -->
                    <li class="page-item"
                        th:classappend="${!users.hasPrevious} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/dashboard/admin/users(
                       page=${users.currentPage - 1},
                       size=${users.pageSize},
                       search=${search})}">
                            <i class="bi bi-chevron-left"></i>
                        </a>
                    </li>

                    <!-- Page number buttons -->
                    <li th:each="i : ${#numbers.sequence(0, users.totalPages - 1)}"
                        class="page-item"
                        th:classappend="${i == users.currentPage} ? 'active'">
                        <a class="page-link"
                           th:href="@{/dashboard/admin/users(
                       page=${i},
                       size=${users.pageSize},
                       search=${search})}"
                           th:text="${i + 1}">1</a>
                    </li>

                    <!-- Next button -->
                    <li class="page-item"
                        th:classappend="${!users.hasNext} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/dashboard/admin/users(
                       page=${users.currentPage + 1},
                       size=${users.pageSize},
                       search=${search})}">
                            <i class="bi bi-chevron-right"></i>
                        </a>
                    </li>

                </ul>
            </nav>
        </div>
    </div>
</div>
</body>
</html>
