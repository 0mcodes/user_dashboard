<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{dashboard/fragments/layout :: layout(~{::content}, 'Manage Users')}">
<body>
<div th:fragment="content">

    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h1 class="page-title">Manage Users</h1>
            <p class="page-subtitle" th:text="${users.totalElements} + ' total users'">0 total users</p>
        </div>
    </div>

    <div class="app-card mb-4">
        <div class="search-bar">
            <form th:action="@{/dashboard/admin/users}" method="get" class="d-flex gap-2 flex-wrap align-items-center">
                <div class="search-input-wrap">
                    <i class="bi bi-search"></i>
                    <input type="text" name="search" th:value="${search}" class="search-input" placeholder="Search by name or email..."/>
                </div>
                <input type="hidden" name="size" th:value="${pageSize}"/>
                <button type="submit" class="btn-red" style="padding:7px 14px;"><i class="bi bi-search"></i>Search</button>
                <a th:href="@{/dashboard/admin/users}" class="btn-ghost" style="padding:7px 14px;"><i class="bi bi-x-lg"></i>Clear</a>
            </form>
        </div>
    </div>

    <div class="app-card">
        <div class="table-responsive">
            <table class="app-table">
                <thead>
                <tr>
                    <th>User</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Location</th>
                    <th>Joined</th>
                    <th>Last Login</th>
                    <th style="text-align:right;padding-right:20px;">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users.content}">
                    <td>
                        <div class="d-flex align-items-center gap-3">
                            <div class="avatar avatar-sm"
                                 th:text="${#strings.substring(user.firstName,0,1)+#strings.substring(user.lastName,0,1)}">??</div>
                            <div>
                                <div class="fw-600 fs-13" th:text="${user.fullName}">Name</div>
                                <div style="font-size:11px;color:#9E9E9E;" th:text="${user.email}">email</div>
                            </div>
                        </div>
                    </td>
                    <td>
                            <span th:switch="${user.role.name()}">
                                <span th:case="'ROLE_ADMIN'" class="role-badge role-admin">ADMIN</span>
                                <span th:case="'ROLE_MANAGER'" class="role-badge role-manager">MANAGER</span>
                                <span th:case="*" class="role-badge role-user">USER</span>
                            </span>
                    </td>
                    <td>
                            <span th:if="${user.enabled}" class="status-badge status-active">
                                <span class="status-dot dot-active"></span>Active
                            </span>
                        <span th:unless="${user.enabled}" class="status-badge status-disabled">
                                <span class="status-dot dot-disabled"></span>Disabled
                            </span>
                    </td>
                    <td class="fs-13" th:text="${user.location != null ? user.location : '—'}">—</td>
                    <td class="fs-13" style="color:#9E9E9E;" th:text="${#temporals.format(user.createdAt,'dd MMM yyyy')}">—</td>
                    <td class="fs-13" style="color:#9E9E9E;"
                        th:text="${user.lastLoginAt != null ? #temporals.format(user.lastLoginAt,'dd MMM yyyy') : 'Never'}">—</td>
                    <td style="text-align:right;padding-right:20px;">
                        <div class="d-flex gap-2 justify-content-end">
                            <button type="button"
                                    class="btn-red-outline" style="padding:5px 10px;font-size:12px;"
                                    data-bs-toggle="modal" data-bs-target="#editRoleModal"
                                    th:data-user-id="${user.id}"
                                    th:data-user-name="${user.fullName}"
                                    th:data-user-email="${user.email}"
                                    th:data-user-phone="${user.phoneNumber}"
                                    th:data-user-role="${user.role.name()}">
                                <i class="bi bi-pencil-square"></i>Edit Role
                            </button>
                            <form th:action="@{/dashboard/admin/users/{id}/toggle(id=${user.id})}" method="post" class="m-0">
                                <input type="hidden" name="enabled" th:value="${!user.enabled}"/>
                                <button type="submit"
                                        th:class="${user.enabled} ? 'btn-warning-ghost' : 'btn-success-ghost'"
                                        th:title="${user.enabled} ? 'Disable' : 'Enable'"
                                        style="padding:5px 8px;">
                                    <i th:class="${user.enabled} ? 'bi bi-pause-fill' : 'bi bi-play-fill'"></i>
                                </button>
                            </form>
                            <form th:action="@{/dashboard/admin/users/{id}/delete(id=${user.id})}" method="post" class="m-0"
                                  onsubmit="return confirm('Permanently delete this user?')">
                                <button type="submit" class="btn-danger-ghost" style="padding:5px 8px;" title="Delete">
                                    <i class="bi bi-trash3"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${users.content.empty}">
                    <td colspan="7" style="text-align:center;padding:48px;color:#9E9E9E;">
                        <i class="bi bi-inbox" style="font-size:40px;display:block;margin-bottom:8px;"></i>
                        No users found<span th:if="${search != null}"> for "<span th:text="${search}"></span>"</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div style="padding:14px 20px;border-top:1px solid #EEE;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
            <span class="fs-13" style="color:#9E9E9E;">
                Showing <strong th:text="${users.currentPage * users.pageSize + 1}">1</strong>
                to <strong th:text="${users.currentPage * users.pageSize + users.content.size()}">10</strong>
                of <strong th:text="${users.totalElements}">0</strong> users
            </span>
            <form th:action="@{/dashboard/admin/users}" method="get" class="d-flex align-items-center gap-2">
                <input type="hidden" name="page" value="0"/>
                <input type="hidden" name="search" th:value="${search}"/>
                <span class="fs-13" style="color:#9E9E9E;">Rows per page:</span>
                <select name="size" onchange="this.form.submit()"
                        style="border:1px solid #E0E0E0;border-radius:6px;padding:4px 8px;font-size:13px;outline:none;">
                    <option value="5"  th:selected="${users.pageSize==5}">5</option>
                    <option value="10" th:selected="${users.pageSize==10}">10</option>
                    <option value="25" th:selected="${users.pageSize==25}">25</option>
                    <option value="50" th:selected="${users.pageSize==50}">50</option>
                </select>
            </form>
            <div class="pagination-custom">
                <a class="page-btn" th:classappend="${!users.hasPrevious} ? 'disabled'"
                   th:href="@{/dashboard/admin/users(page=${users.currentPage-1},size=${users.pageSize},search=${search})}">
                    <i class="bi bi-chevron-left"></i>
                </a>
                <a th:each="i : ${#numbers.sequence(0,users.totalPages-1)}" class="page-btn"
                   th:classappend="${i==users.currentPage} ? 'active'"
                   th:href="@{/dashboard/admin/users(page=${i},size=${users.pageSize},search=${search})}"
                   th:text="${i+1}">1</a>
                <a class="page-btn" th:classappend="${!users.hasNext} ? 'disabled'"
                   th:href="@{/dashboard/admin/users(page=${users.currentPage+1},size=${users.pageSize},search=${search})}">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </div>
        </div>
    </div>

    <!-- Edit Role Modal -->
    <div class="modal fade app-modal" id="editRoleModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-person-gear me-2"></i>Edit User Role</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div style="background:#FAFAFA;border:1px solid #EEE;border-radius:10px;
                                padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:20px;">
                        <div class="avatar avatar-md" id="modalUserAvatar">??</div>
                        <div>
                            <div class="fw-700 fs-14" id="modalUserName">-</div>
                            <div class="fs-13" style="color:#9E9E9E;" id="modalUserEmail">-</div>
                            <div class="fs-12" style="color:#9E9E9E;" id="modalUserPhone">-</div>
                        </div>
                    </div>
                    <form id="editRoleForm" method="post">
                        <div class="mb-3">
                            <label class="form-label-custom">Current Role</label>
                            <div id="modalCurrentRole"
                                 style="padding:9px 13px;background:#F5F5F5;border:1.5px solid #EEE;
                                        border-radius:6px;font-size:13.5px;color:#616161;">-</div>
                        </div>
                        <div>
                            <label class="form-label-custom" for="modalRoleSelect">Assign New Role</label>
                            <select id="modalRoleSelect" name="role" class="form-control-custom">
                                <option value="ROLE_USER">User — basic access</option>
                                <option value="ROLE_MANAGER">Manager — team management</option>
                                <option value="ROLE_ADMIN">Admin — full access</option>
                            </select>
                            <span class="fs-12" style="color:#9E9E9E;margin-top:6px;display:block;">
                                <i class="bi bi-info-circle me-1"></i>Changes take effect on user's next login.
                            </span>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-ghost" data-bs-dismiss="modal"><i class="bi bi-x-lg"></i>Cancel</button>
                    <button type="button" class="btn-red" onclick="submitRoleForm()"><i class="bi bi-check-lg"></i>Save Role</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('editRoleModal').addEventListener('show.bs.modal', function(e) {
            const btn = e.relatedTarget;
            const id    = btn.getAttribute('data-user-id');
            const name  = btn.getAttribute('data-user-name');
            const email = btn.getAttribute('data-user-email');
            const phone = btn.getAttribute('data-user-phone');
            const role  = btn.getAttribute('data-user-role');
            const initials = name.split(' ').map(n=>n[0]).join('').toUpperCase().substring(0,2);
            document.getElementById('modalUserAvatar').textContent  = initials;
            document.getElementById('modalUserName').textContent    = name;
            document.getElementById('modalUserEmail').textContent   = email;
            document.getElementById('modalUserPhone').textContent   = phone || 'No phone';
            document.getElementById('modalCurrentRole').textContent = role.replace('ROLE_','');
            document.getElementById('modalRoleSelect').value        = role;
            document.getElementById('editRoleForm').action          = `/dashboard/admin/users/${id}/role`;
        });
        function submitRoleForm() {
            document.getElementById('editRoleForm').submit();
        }
    </script>

</div>
</body>
</html>
