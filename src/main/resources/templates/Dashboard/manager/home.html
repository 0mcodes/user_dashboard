<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{dashboard/fragments/layout :: layout(~{::content}, 'Manager Overview')}">
<body>
<div th:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-1">Manager Overview</h4>
            <p class="text-muted small mb-0">Team statistics and quick actions</p>
        </div>
        <a th:href="@{/dashboard/manager/users}" class="btn btn-primary btn-sm">
            <i class="bi bi-person-check me-1"></i>Team Users
        </a>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-sm-6 col-xl-3">
            <div class="stat-card card border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex align-items-center justify-content-between">
                        <div>
                            <div class="text-muted small fw-medium">Total Users</div>
                            <div class="stat-number text-primary"
                                 th:text="${stats.totalUsers}">0</div>
                        </div>
                        <div class="stat-icon bg-primary bg-opacity-10 text-primary">
                            <i class="bi bi-people-fill"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-3">
            <div class="stat-card card border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex align-items-center justify-content-between">
                        <div>
                            <div class="text-muted small fw-medium">Active</div>
                            <div class="stat-number text-success"
                                 th:text="${stats.activeUsers}">0</div>
                        </div>
                        <div class="stat-icon bg-success bg-opacity-10 text-success">
                            <i class="bi bi-person-check-fill"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-3">
            <div class="stat-card card border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex align-items-center justify-content-between">
                        <div>
                            <div class="text-muted small fw-medium">New This Week</div>
                            <div class="stat-number text-info"
                                 th:text="${stats.newUsersThisWeek}">0</div>
                        </div>
                        <div class="stat-icon bg-info bg-opacity-10 text-info">
                            <i class="bi bi-person-plus-fill"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-3">
            <div class="stat-card card border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex align-items-center justify-content-between">
                        <div>
                            <div class="text-muted small fw-medium">Managers</div>
                            <div class="stat-number text-warning"
                                 th:text="${stats.totalManagers}">0</div>
                        </div>
                        <div class="stat-icon bg-warning bg-opacity-10 text-warning">
                            <i class="bi bi-person-badge-fill"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white fw-medium">Quick Actions</div>
        <div class="card-body">
            <div class="d-flex flex-wrap gap-2">
                <a th:href="@{/dashboard/manager/users}"
                   class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-people me-1"></i>View Team
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
