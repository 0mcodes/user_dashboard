<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{dashboard/fragments/layout :: layout(~{::content}, 'Manager Overview')}">
<body>
<div th:fragment="content">

    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h1 class="page-title">Manager Overview</h1>
            <p class="page-subtitle">Team statistics at a glance</p>
        </div>
        <a th:href="@{/dashboard/manager/users}" class="btn-red">
            <i class="bi bi-person-check"></i>Team Users
        </a>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-sm-6 col-xl-3">
            <div class="stat-card">
                <div class="stat-card-top">
                    <div>
                        <div class="stat-label">Total Users</div>
                        <div class="stat-value" th:text="${stats.totalUsers}">0</div>
                    </div>
                    <div class="stat-icon stat-icon-red"><i class="bi bi-people-fill"></i></div>
                </div>
                <div class="stat-sub"><span style="color:#2E7D32;font-weight:600;" th:text="${stats.newUsersToday}">0</span> new today</div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-3">
            <div class="stat-card">
                <div class="stat-card-top">
                    <div>
                        <div class="stat-label">Active Users</div>
                        <div class="stat-value" th:text="${stats.activeUsers}">0</div>
                    </div>
                    <div class="stat-icon stat-icon-green"><i class="bi bi-person-check-fill"></i></div>
                </div>
                <div class="stat-sub"><span style="color:#C0392B;font-weight:600;" th:text="${stats.disabledUsers}">0</span> disabled</div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-3">
            <div class="stat-card">
                <div class="stat-card-top">
                    <div>
                        <div class="stat-label">New This Week</div>
                        <div class="stat-value" th:text="${stats.newUsersThisWeek}">0</div>
                    </div>
                    <div class="stat-icon stat-icon-blue"><i class="bi bi-person-plus-fill"></i></div>
                </div>
                <div class="stat-sub"><span th:text="${stats.newUsersThisMonth}">0</span> this month</div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-3">
            <div class="stat-card">
                <div class="stat-card-top">
                    <div>
                        <div class="stat-label">Managers</div>
                        <div class="stat-value" th:text="${stats.totalManagers}">0</div>
                    </div>
                    <div class="stat-icon stat-icon-orange"><i class="bi bi-person-badge-fill"></i></div>
                </div>
                <div class="stat-sub"><span th:text="${stats.totalRegularUsers}">0</span> regular users</div>
            </div>
        </div>
    </div>

    <div class="app-card">
        <div class="app-card-header">
            <h2 class="app-card-title">Quick Actions</h2>
        </div>
        <div class="app-card-body d-flex flex-wrap gap-2">
            <a th:href="@{/dashboard/manager/users}" class="btn-red">
                <i class="bi bi-people"></i>View Team
            </a>
        </div>
    </div>

</div>
</body>
</html>
