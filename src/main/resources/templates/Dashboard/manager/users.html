<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{dashboard/fragments/layout :: layout(~{::content}, 'Team Users')}">
<body>
<div th:fragment="content">

    <div class="mb-4">
        <h4 class="fw-bold mb-1">Team Users</h4>
        <p class="text-muted small mb-0">View and promote team members</p>
    </div>

    <!-- Search -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body py-3">
            <form th:action="@{/dashboard/manager/users}" method="get" class="d-flex gap-2">
                <input type="text" name="search" th:value="${search}"
                       class="form-control form-control-sm"
                       placeholder="Search by name or email..."
                       style="max-width:320px;"/>
                <button type="submit" class="btn btn-primary btn-sm">
                    <i class="bi bi-search me-1"></i>Search
                </button>
                <a th:href="@{/dashboard/manager/users}"
                   class="btn btn-outline-secondary btn-sm">Clear</a>
            </form>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th class="ps-4">User</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Joined</th>
                        <th class="text-end pe-4">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users.content}">
                        <td class="ps-4">
                            <div class="d-flex align-items-center gap-3">
                                <div class="avatar-circle"
                                     th:text="${#strings.substring(user.firstName,0,1) + #strings.substring(user.lastName,0,1)}">??</div>
                                <div>
                                    <div class="fw-medium small" th:text="${user.fullName}">Name</div>
                                    <div class="text-muted" style="font-size:11px;" th:text="${user.email}">email</div>
                                </div>
                            </div>
                        </td>
                        <td>
                                <span th:switch="${user.role.name()}">
                                    <span th:case="'ROLE_ADMIN'" class="badge bg-danger">ADMIN</span>
                                    <span th:case="'ROLE_MANAGER'" class="badge bg-warning text-dark">MANAGER</span>
                                    <span th:case="*" class="badge bg-secondary">USER</span>
                                </span>
                        </td>
                        <td>
                                <span th:if="${user.enabled}"
                                      class="badge bg-success-subtle text-success border border-success-subtle">Active</span>
                            <span th:unless="${user.enabled}"
                                  class="badge bg-danger-subtle text-danger border border-danger-subtle">Disabled</span>
                        </td>
                        <td class="small text-muted"
                            th:text="${#temporals.format(user.createdAt,'dd MMM yyyy')}">-</td>
                        <td class="text-end pe-4">
                            <!-- Only promote ROLE_USER to MANAGER -->
                            <form th:if="${user.role.name() == 'ROLE_USER'}"
                                  th:action="@{/dashboard/manager/users/{id}/promote(id=${user.id})}"
                                  method="post" class="d-inline">
                                <button type="submit"
                                        class="btn btn-outline-warning btn-sm"
                                        onclick="return confirm('Promote this user to Manager?')">
                                    <i class="bi bi-arrow-up-circle me-1"></i>Promote
                                </button>
                            </form>
                            <a th:href="@{/dashboard/manager/audit-logs/{id}(id=${user.id})}"
                               class="btn btn-outline-secondary btn-sm ms-1">
                                <i class="bi bi-journal-text"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${users.content.empty}">
                        <td colspan="5" class="text-center py-5 text-muted">
                            <i class="bi bi-inbox fs-1 d-block mb-2"></i>No users found
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <!-- Pagination -->
        <div class="card-footer bg-white d-flex justify-content-between align-items-center">
            <small class="text-muted">
                <span th:text="${users.totalElements}">0</span> users
            </small>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${!users.hasPrevious} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/dashboard/manager/users(page=${users.currentPage - 1})}">
                            <i class="bi bi-chevron-left"></i></a>
                    </li>
                    <li class="page-item" th:classappend="${!users.hasNext} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/dashboard/manager/users(page=${users.currentPage + 1})}">
                            <i class="bi bi-chevron-right"></i></a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>
</body>
</html>
