spring.application.name=User Dashboard
spring.profiles.active=dev

server.port =  8080

app.jwt.secret=ThisIsAVerySecureSecretKeyThatIsAtLeast256BitsLong!
app.jwt.expiration=86400000

# Swagger UI ? visit http://localhost:8080/swagger-ui.html after starting
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Logging levels
logging.level.root=INFO
logging.level.com.dashboard=DEBUG
logging.level.org.springframework.security=DEBUG

# Mail config for forgot-password emails
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# How long a password reset link is valid (minutes)
app.password-reset.expiry-minutes=15
app.frontend.url=http://localhost:3000

# Thymeleaf config
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# Default admin credentials for DataSeeder
# In production, override these with environment variables:
# APP_ADMIN_EMAIL, APP_ADMIN_PASSWORD etc.
app.admin.email=admin@dashboard.com
app.admin.password=Admin@123
app.admin.firstName=System
app.admin.lastName=Admin

# Set to false in production after initial setup
# to prevent seeding sample users on every deployment
app.seed.sample-users=true