# ????????????????????????????????????????????????????????????????
# MYSQL DATABASE CONFIGURATION ? Local Development
# ????????????????????????????????????????????????????????????????

# The JDBC URL format for MySQL:
# jdbc:mysql://host:port/databaseName?parameters
#
# localhost         = MySQL is running on the same machine
# 3306              = MySQL default port
# userdashboard     = the database we created
#
# URL Parameters explained:
# useSSL=false
#   Disable SSL for local development ? MySQL requires SSL by default
#   in newer versions. For local dev, we turn it off for simplicity.
#   In production on Railway/Render, SSL is handled by the platform.
#
# allowPublicKeyRetrieval=true
#   Required for MySQL 8.0+ with strong authentication.
#   Without this, you get: "Public Key Retrieval is not allowed"
#   error when connecting.
#
# serverTimezone=Asia/Kolkata
#   MySQL needs to know the timezone to store timestamps correctly.
#   Change this to your timezone if different:
#   UTC, America/New_York, Europe/London, Asia/Singapore etc.
#
# characterEncoding=UTF-8
#   Ensures all text is stored and retrieved as UTF-8.
#   Prevents character corruption for non-ASCII text.
#
# useUnicode=true
#   Works with characterEncoding to ensure Unicode support.
spring.datasource.url=jdbc:mysql://localhost:3306/userdashboard\
    ?useSSL=false\
    &allowPublicKeyRetrieval=true\
    &serverTimezone=Asia/Kolkata\
    &characterEncoding=UTF-8\
    &useUnicode=true

# The dedicated application user we created in MySQL
# NEVER use root here
spring.datasource.username=dashboarduser
spring.datasource.password=Dashboard@123

# The MySQL JDBC driver class
# Spring Boot auto-detects this from the URL in newer versions
# but explicit declaration is cleaner and more reliable
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ????????????????????????????????????????????????????????????????
# CONNECTION POOL ? HikariCP (Spring Boot's default)
# ????????????????????????????????????????????????????????????????

# HikariCP is the fastest Java connection pool available.
# It's Spring Boot's default ? zero configuration needed
# for basic usage. These are optional tuning parameters.

# Maximum number of connections in the pool
# For local development, 5 is plenty
# Formula for production: connections = (2 * CPU cores) + effective_spindle_count
spring.datasource.hikari.maximum-pool-size=5

# Minimum number of idle connections to maintain in the pool
spring.datasource.hikari.minimum-idle=2

# How long a connection can sit idle before being removed (ms)
# 600000 = 10 minutes
spring.datasource.hikari.idle-timeout=600000

# How long to wait for a connection from the pool before throwing
# an exception (ms). 30000 = 30 seconds
spring.datasource.hikari.connection-timeout=30000

# ????????????????????????????????????????????????????????????????
# JPA / HIBERNATE CONFIGURATION
# ????????????????????????????????????????????????????????????????

# update = Hibernate will:
# - Create tables that don't exist yet
# - Add columns that are missing
# - NEVER delete existing columns or tables
# Safe for development ? you don't lose data between restarts
# but schema evolves with your entity changes
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in the console ? invaluable for learning
# You'll see every SELECT, INSERT, UPDATE, DELETE Hibernate generates
spring.jpa.show-sql=true

# Format the SQL nicely ? readable multi-line format
# instead of one long line
spring.jpa.properties.hibernate.format_sql=true

# Tell Hibernate to generate SQL compatible with MySQL 8.0
# Without this, Hibernate might use generic SQL that doesn't
# take advantage of MySQL-specific features
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Allows Thymeleaf templates to access Hibernate-managed
# collections even after the transaction is closed.
# Important for avoiding LazyInitializationException in templates.
spring.jpa.open-in-view=false

# ????????????????????????????????????????????????????????????????
# H2 CONSOLE ? DISABLED (we now use MySQL Workbench or CLI)
# ????????????????????????????????????????????????????????????????
spring.h2.console.enabled=false