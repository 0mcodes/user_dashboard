# H2 in-memory database ? lives in RAM, zero installation
# Created fresh every startup, destroyed every shutdown
spring.datasource.url=jdbc:h2:file:./data/dashboarddb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console ? Admin's live database viewer
# Visit: http://localhost:8080/h2-console
# JDBC URL to enter: jdbc:h2:mem:dashboarddb
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate table creation strategy:
# create-drop = create tables on startup, drop on shutdown
# This means fresh data every restart ? perfect for development
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect